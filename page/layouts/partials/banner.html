{{ if .Site.Params.banner.show }}
    {{ $url := .Site.Params.banner.url }}
    <a class="contao-banner" href="{{ $url | safeURL }}" target="_blank" rel="noreferrer noopener">
        <span class="contao-banner__title">{{ i18n "banner_title" }}</span>
        <span class="contao-banner__date">{{ i18n "banner_date" }}</span>
    </a>
{{ end }}
